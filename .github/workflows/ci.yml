name: Banking Ledger CI/CD

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  # ═══ Build & Unit Tests (nextest + sccache) ═══
  test:
    name: Test (Rust stable)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: clippy
      
      - name: Run sccache (Mozilla compile cache)
        uses: mozilla-actions/sccache-action@v0.0.9
      
      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      
      - name: Build
        run: cargo build --verbose
      
      - name: Run tests (nextest — parallel, fail-fast)
        run: cargo nextest run --profile ci
      
      - name: Clippy (lints)
        run: cargo clippy -- -D warnings -A dead_code -A clippy::manual_checked_ops

  # ═══ Integration Tests ═══
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      
      - name: Run sccache
        uses: mozilla-actions/sccache-action@v0.0.9
      
      - name: Build release
        run: cargo build --release
      
      - name: Start server + run API tests
        run: |
          cargo run --release &
          sleep 3
          python3 test_api.py
      
      - name: Stop server
        if: always()
        run: pkill banking-ledger || true

  # ═══ Security Audit ═══
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run cargo-audit (if installed)
        run: cargo audit 2>/dev/null || echo "⚠️ cargo-audit not available, skipping"
